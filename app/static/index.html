<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Port Traffic Pulse</title>
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
    crossorigin=""
  />
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div id="app">
    <header id="topbar">
      <div class="brand">
        <span class="pulse-dot"></span>
        <h1>Port Traffic Pulse</h1>
        <span class="subtitle">Zywy uklad nerwowy portu &middot; TomTom Traffic</span>
      </div>
      <div class="controls">
        <label for="portSelect">Port:</label>
        <select id="portSelect"></select>
        <label class="toggle"><input type="checkbox" id="flowToggle" checked /> Flow</label>
        <label class="toggle"><input type="checkbox" id="incidentsToggle" checked /> Incydenty</label>
        <button id="notifyBtn" title="Włącz powiadomienia">Włącz Powiadomienia</button>
        <button id="refreshBtn">Odswiez teraz</button>
        <button id="themeToggle" title="Przelacz tryb jasny/ciemny" aria-label="Przelacz tryb jasny/ciemny">
          <span class="theme-icon theme-icon--dark">🌙</span>
          <span class="theme-icon theme-icon--light">☀️</span>
        </button>
        <span id="lastPoll" class="last-poll">--</span>
      </div>
    </header>

    <div id="layout">
      <div id="map"></div>
      <aside id="sidebar">
        <nav class="tabs">
          <button class="tab active" data-tab="status">Stan</button>
          <button class="tab" data-tab="bottlenecks">Waskie gardla</button>
          <button class="tab" data-tab="reports">Raporty</button>
          <button class="tab" data-tab="incidents">Incydenty</button>
          <button class="tab" data-tab="predictions">Predykcja</button>
          <button class="tab" data-tab="analytics">Analityka</button>
        </nav>
        <div class="tab-panels">
          <section class="panel active" id="panel-status"></section>
          <section class="panel" id="panel-bottlenecks"></section>
          <section class="panel" id="panel-reports"></section>
          <section class="panel" id="panel-incidents"></section>
          <section class="panel" id="panel-predictions">
            <div class="prediction-controls">
              <label for="predictionHorizon">Horyzont prognozy: <span id="horizonLabel">1</span>h</label>
              <input type="range" id="predictionHorizon" min="1" max="12" value="1" />
              <button id="trainBtn" class="action-btn" title="Zbuduj model ML na podstawie historii">Trenuj ML</button>
            </div>
            <div id="predictions-content"></div>
          </section>
          <section class="panel" id="panel-analytics"></section>
        </div>
      </aside>
    </div>
  </div>

  <script
    src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
    integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
    crossorigin=""
  ></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging-compat.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
  <script src="/static/app.js"></script>
  <script src="/static/analytics.js"></script>
</body>
</html>
